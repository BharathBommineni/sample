<html>
    <head>
        <title>Table</title>
    </head>
    <style>
        body{
            background-color: bisque;
           font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width:80%;
            margin:40px auto;
            border-collapse: separate;
            border-spacing:5px;
        }
        
        th{
          background-color:rgb(97, 204, 51);
          color:whitesmoke;
          border-radius: 10px; 
          padding:12px;
          text-align: center;
        }
        td{
           background-color: rgb(206, 255, 166);
           text-align:center;
           color:black;
           padding:5px;
        }
        tr:hover td{
            background-color: white;
            color:rgb(15, 215, 39);
        }
        caption{
            caption-side:top;
        }

    </style>
    <body>
        <table>
            <caption>Product details</caption>
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Quality</th>                
                <th>Product Quantity</th>                
            </tr>
            <tr>
                <td>1</td>
                <td>Wheat</td>
                <td>Good</td>
                <td>200 Bags</td>
            </tr>
            <tr>
                <td>2</td>
                <td>rice</td>
                <td>good</td>
                <td>250 bags</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Sugar</td>
                <td>Good</td>
                <td>200 Bags</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Sugar</td>
                <td>Good</td>
                <td>200 Bags</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Sugar</td>
                <td>Good</td>
                <td>200 bags</td>
            </tr>
            <tfoot>
                <tr>
                    <td>overall</td>
                    <td>Sugar</td>
                    <td>Good</td>
                    <td>200 Bags<td>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
